name: Build XCFrameworks

on:
  push:
    branches:
      - main
    paths:
      - 'config/upstream.json'
      - 'config/xcode-versions.json'

permissions:
  contents: write

jobs:
  detect-changes:
    name: Detect what to build
    runs-on: macos-26
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Build matrix
        id: matrix
        run: echo "matrix=$(bash scripts/detect-changes.sh)" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.branch }} (Xcode ${{ matrix.xcode_version }})
    needs: detect-changes
    if: fromJSON(needs.detect-changes.outputs.matrix).include[0] != null
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.detect-changes.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Build xcframeworks
        run: |
          bash scripts/build-xcframework.sh \
            "${{ matrix.branch }}" \
            "${{ matrix.sha }}" \
            "${{ matrix.xcode_app }}" \
            "./build-output/${{ matrix.branch }}/${{ matrix.xcode_version }}"

      - name: Package artifacts
        run: |
          bash scripts/package-release.sh \
            "./build-output/${{ matrix.branch }}/${{ matrix.xcode_version }}" \
            "./release-artifacts/${{ matrix.branch }}" \
            "${{ matrix.xcode_version }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.branch }}-xcode${{ matrix.xcode_version }}
          path: ./release-artifacts/${{ matrix.branch }}/
          retention-days: 5

  release:
    name: Publish release (${{ matrix.branch }})
    needs: [detect-changes, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: macos-26
    strategy:
      matrix:
        branch: [community, master]
    steps:
      - uses: actions/checkout@v4

      - name: Read build info
        id: info
        run: |
          BRANCH="${{ matrix.branch }}"
          VERSION=$(jq -r --arg b "$BRANCH" '.branches[$b].last_built_version' config/upstream.json)
          BUILD_NUM=$(jq -r --arg b "$BRANCH" '.branches[$b].build_number' config/upstream.json)
          SHA=$(jq -r --arg b "$BRANCH" '.branches[$b].last_built_sha' config/upstream.json)
          NEW_BUILD_NUM=$((BUILD_NUM + 1))
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "build_number=${NEW_BUILD_NUM}" >> "$GITHUB_OUTPUT"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "tag=${BRANCH}-${VERSION}-build.${NEW_BUILD_NUM}" >> "$GITHUB_OUTPUT"
          if [ -z "$SHA" ] || [ "$SHA" = "" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts for this branch
        if: steps.info.outputs.skip == 'false'
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ matrix.branch }}-*
          path: ./release-artifacts/
          merge-multiple: true

      - name: Create GitHub Release
        if: steps.info.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          bash scripts/create-release.sh \
            "${{ matrix.branch }}" \
            "${{ steps.info.outputs.version }}" \
            "${{ steps.info.outputs.sha }}" \
            "${{ steps.info.outputs.tag }}" \
            "${{ steps.info.outputs.build_number }}" \
            "./release-artifacts" \
            "HamstringAssassin/realm-swift-xcframeworks"

      - name: Bump build number
        if: steps.info.outputs.skip == 'false'
        run: |
          bash scripts/bump-build-number.sh \
            "${{ matrix.branch }}" \
            "${{ steps.info.outputs.build_number }}"
