name: Check Upstream Updates

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Specific branch to check (leave empty for all)'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write

jobs:
  check:
    name: Check ${{ matrix.branch }}
    runs-on: macos-26
    strategy:
      matrix:
        branch: [community, master]
    steps:
      - uses: actions/checkout@v4

      - name: Filter branch (manual dispatch)
        id: filter
        if: github.event.inputs.branch != '' && github.event.inputs.branch != matrix.branch
        run: echo "skip=true" >> "$GITHUB_OUTPUT"

      - name: Read last built SHA
        if: steps.filter.outputs.skip != 'true'
        id: read-state
        run: |
          LAST_SHA=$(jq -r '.branches["${{ matrix.branch }}"].last_built_sha' config/upstream.json)
          echo "last_sha=${LAST_SHA}" >> "$GITHUB_OUTPUT"

      - name: Check upstream
        if: steps.filter.outputs.skip != 'true'
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RESULT=$(bash scripts/check-upstream.sh "${{ matrix.branch }}" "${{ steps.read-state.outputs.last_sha }}")
          echo "result=${RESULT}" >> "$GITHUB_OUTPUT"
          echo "has_update=$(echo "$RESULT" | jq -r '.has_update')" >> "$GITHUB_OUTPUT"

      - name: Generate app token
        if: steps.filter.outputs.skip != 'true' && steps.check.outputs.has_update == 'true'
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Open PR
        if: steps.filter.outputs.skip != 'true' && steps.check.outputs.has_update == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          bash scripts/open-pr.sh \
            "${{ matrix.branch }}" \
            '${{ steps.check.outputs.result }}' \
            "${{ steps.app-token.outputs.token }}" \
            "HamstringAssassin/realm-swift-xcframeworks"
